<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>메모장</title>
  <link rel="stylesheet" th:href="@{/font/Dokdo.css}" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: 'MYYeongnamnu', cursive;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: black;
    }

    .container {
      height: 100%;
      box-sizing: border-box;
      padding: 40px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .title {
      font-size: 40px;
      font-weight: bold;
    }

    .back-btn {
      text-decoration: none;
      font-size: 1.2rem;
      background: rgba(255,255,255,0.6);
      padding: 4px 12px;
      border-radius: 8px;
      color: black;
    }

    .memo {
      height: calc(100% - 100px);
      font-size: 32px;
      line-height: 1.8;
      outline: none;
      white-space: pre-wrap;
      overflow-y: auto;
      background: transparent;
    }
  </style>
</head>
<body th:style="|background-image: url('@{/images/BookIn.png}')|">
  <div class="container">
    <div class="top-bar">
      <a class="back-btn" th:href="@{/book}">← 책으로</a>
      <div class="title">Memo</div>
    </div>
    <!-- localStorage 를 통해 브라우저에서 저장 (서버 저장 없음) -->
    <div class="memo" contenteditable="true" id="memo"></div>
  </div>

  <script>
    const memoEl = document.getElementById('memo');

    window.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('memoContent');
      if (saved) memoEl.innerText = saved;
    });

    memoEl.addEventListener('input', () => {
      localStorage.setItem('memoContent', memoEl.innerText);
    });
  </script>
</body>
</html>
